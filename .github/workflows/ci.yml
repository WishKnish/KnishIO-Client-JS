# JS SDK CI — enforces the ESLint gate (restored cycle 11) + the jest suite.
# Born-enforced: the repo had no CI, so the lint gate was local-only/bypassable until now.
name: CI

on: [push, pull_request]

jobs:
  gate:
    name: lint + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # No lockfile is committed (both npm and yarn locks are gitignored); npm install
      # resolves fresh and writes an ephemeral package-lock.json that npm audit reads.
      - name: Install dependencies
        run: npm install

      # Dependency audit gate: fail on high/critical advisories in the published
      # dependency tree (dev tooling is reported by the full audit but not enforced).
      - name: npm audit (prod deps, high+)
        run: npm audit --omit=dev --audit-level=high

      # The enforced lint gate (eslint.config.js, ESLint 9 flat config): 0 errors (warnings allowed).
      - name: ESLint (lint gate)
        run: npm run lint

      # jest unit suite (incl. the cross-SDK canonical-vector parity tests). The
      # live-validator integration suite auto-skips without KNISHIO_TEST_URI.
      - name: Jest
        run: npm test
